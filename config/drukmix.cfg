[drukmix]
enabled = True

moonraker_ws = ws://127.0.0.1:7125/websocket

backend = pumpvfd
serial_port = /dev/serial/by-id/REPLACE_WITH_YOUR_BRIDGE
serial_baud = 921600

client_name = drukmix
client_version = 4.0.0-backend
client_type = agent
client_url = https://example.local/drukmix

printer_cfg = /home/dan/printer_data/config/printer.cfg
filament_diameter_fallback = 35.0

max_flow_lpm = 10.0
gain_pct = 100.0
min_print_mms = 0.0
min_flow_pct = 0.0
min_flow_hold_s = 0.0
retract_deadband_mms = 0.20
retract_gain_pct = 100.0

update_hz = 6.0
log_period_s = 5.0

pause_on_pump_offline = True
pause_on_manual_mode = True
ui_notify = True

bridge_offline_timeout_s = 1.0
pump_offline_timeout_s = 1.2

log_file = /home/dan/printer_data/logs/drukmix.log
log_level = info

flush_confirm = False
cfg_reload_s = 2.0
