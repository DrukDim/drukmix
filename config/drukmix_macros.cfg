[gcode_macro DRUKMIX_FLUSH]
description: Start pump flush at requested LPM
gcode:
  {% set lpm = params.LPM|default(1.0)|float %}
  {% set dur = params.DURATION|default(0.0)|float %}
  {action_call_remote_method("drukmix_flush", lpm=lpm, duration=dur)}

[gcode_macro DRUKMIX_FLUSH_STOP]
description: Stop pump flush
gcode:
  {action_call_remote_method("drukmix_flush_stop")}

[gcode_macro DRUKMIX_GAIN]
description: Set or clear flow gain override
gcode:
  {% if 'CLEAR' in params %}
    {action_call_remote_method("drukmix_set_gain", clear=True)}
  {% else %}
    {% set g = params.GAIN|float %}
    {action_call_remote_method("drukmix_set_gain", gain=g)}
  {% endif %}

[gcode_macro DRUKMIX_LIMITS]
description: Update runtime limits
gcode:
  {% if 'MAX_LPM' in params %}
    {action_call_remote_method("drukmix_set_limits", pump_max_lpm=params.MAX_LPM|float)}
  {% endif %}
  {% if 'MIN_LPM' in params %}
    {action_call_remote_method("drukmix_set_limits", min_run_lpm=params.MIN_LPM|float)}
  {% endif %}
  {% if 'HOLD_S' in params %}
    {action_call_remote_method("drukmix_set_limits", min_run_hold_s=params.HOLD_S|float)}
  {% endif %}

[gcode_macro DRUKMIX_DEBUG]
description: Set runtime log level off/info/debug
gcode:
  {% set lvl = params.LEVEL|default("info")|string %}
  {action_call_remote_method("drukmix_set_debug", level=lvl)}

[gcode_macro DRUKMIX_CLEAR]
description: Clear runtime overrides and reload cfg defaults
gcode:
  {action_call_remote_method("drukmix_clear_overrides")}

[gcode_macro DRUKMIX_RELOAD]
description: Force cfg reload
gcode:
  {action_call_remote_method("drukmix_reload_cfg")}

[gcode_macro DRUKMIX_PING]
description: Ping drukmix agent
gcode:
  {action_call_remote_method("drukmix_ping")}

[gcode_macro DRUKMIX_STATUS]
description: Show drukmix status
gcode:
  {action_call_remote_method("drukmix_status")}

[gcode_macro DRUKMIX_RESET_FAULT]
description: Reset drive fault via drukmix agent
gcode:
  {% set sel = params.SELECTOR|default(0)|int %}
  {action_call_remote_method("drukmix_reset_fault", selector=sel)}
