[drukmix]
enabled = true

# -----------------------------
# Moonraker websocket (локально)
# -----------------------------
# Агент підключається як client_type=agent і реєструє remote methods,
# які викликаються з Klipper макросів через action_call_remote_method().
moonraker_ws = ws://127.0.0.1:7125/websocket

# -----------------------------
# USB bridge serial (CP2102)
# -----------------------------
serial_port = /dev/serial/by-id/usb-Silicon_Labs_CP2102_USB_to_UART_Bridge_Controller_0001-if00-port0
serial_baud = 921600

# -----------------------------
# Moonraker identify (для списку clients)
# -----------------------------
client_name = drukmix
client_version = 2.2.0
client_type = agent
client_url = https://drukos.local/drukmix

# -----------------------------
# Модель насоса (Л/хв)
# -----------------------------
pump_max_lpm = 10.0

# Мінімальний стабільний потік
min_run_lpm = 0.20

# Холд після зупинки екструзії (сек)
min_run_hold_s = 5.0

# Калібрувальний коефіцієнт (головна “крутилка” під бетон)
flow_gain = 2.0
# Ретракт (назад): чутливість по швидкості
retract_deadband_mm_s = 0.20
retract_gain = 1.0
# -----------------------------
# “Віртуальний філамент” (масштаб)
# -----------------------------
# filament_diameter береться з [extruder] у printer.cfg
printer_cfg = /home/dan/printer_data/config/printer.cfg
filament_diameter_fallback = 35.0

# -----------------------------
# Частоти
# -----------------------------
update_hz = 6
poll_hz = 0.5

# -----------------------------
# Fault policy
# -----------------------------
bridge_offline_timeout_s = 1.0
pump_offline_timeout_s = 1.2

pause_on_pump_offline = true
pause_on_manual_during_print = true
ui_notify = true

# -----------------------------
# Logging
# -----------------------------
log_file = /home/dan/printer_data/logs/drukmix.log
log_level = info
log_period_s = 5.0     # для info summary; debug лог ~1 Гц

# -----------------------------
# FLUSH reliability
# -----------------------------
flush_burst_count = 10
flush_burst_interval_ms = 20

flush_confirm = true
flush_confirm_timeout_s = 1.2
flush_confirm_tolerance_code = 8
flush_confirm_retries = 2

# -----------------------------
# cfg auto-reload
# -----------------------------
cfg_reload_s = 2.0
