# -----------------------------------------
# DrukMix macros (Moonraker remote methods)
# -----------------------------------------
# Ланцюжок:
# Klipper macro -> action_call_remote_method -> Moonraker -> Agent -> USB bridge -> ESP-NOW -> Pump
#
# Важливо:
# - Макроси не керують насосом напряму.
# - Вони лише викликають remote method, який ловить агент.

[gcode_macro DRUKMIX_FLUSH]
description: "Примусово задати потік насоса LPM. D=сек (0=безстроково)."
gcode:
  {% set lpm = params.LPM|default(10.0)|float %}
  {% set dur = params.D|default(0.0)|float %}
  {action_call_remote_method("drukmix_flush", lpm=lpm, duration=dur)}
  RESPOND TYPE=command MSG="DrukMix: FLUSH request lpm={lpm} dur={dur}s"

[gcode_macro DRUKMIX_FLUSH_STOP]
description: "Зупинити FLUSH (агент зробить burst+confirm)."
gcode:
  {action_call_remote_method("drukmix_flush_stop")}
  RESPOND TYPE=command MSG="DrukMix: FLUSH_STOP request"

[gcode_macro DRUKMIX_GAIN]
description: "Gain override. G=...  CLEAR=1 повертає cfg gain."
gcode:
  {% set clear = params.CLEAR|default(0)|int %}
  {% if clear %}
    {action_call_remote_method("drukmix_set_gain", clear=True)}
    RESPOND TYPE=command MSG="DrukMix: gain -> cfg"
  {% else %}
    {% set g = params.G|default(1.0)|float %}
    {action_call_remote_method("drukmix_set_gain", gain=g)}
    RESPOND TYPE=command MSG="DrukMix: gain={g}"
  {% endif %}

[gcode_macro DRUKMIX_LIMITS]
description: "Override лімітів: MAX_LPM, MIN_LPM, HOLD_S (без запису в cfg)."
gcode:
  {% set any = 0 %}
  {% if 'MAX_LPM' in params %}
    {action_call_remote_method("drukmix_set_limits", pump_max_lpm=params.MAX_LPM|float)}
    {% set any = 1 %}
  {% endif %}
  {% if 'MIN_LPM' in params %}
    {action_call_remote_method("drukmix_set_limits", min_run_lpm=params.MIN_LPM|float)}
    {% set any = 1 %}
  {% endif %}
  {% if 'HOLD_S' in params %}
    {action_call_remote_method("drukmix_set_limits", min_run_hold_s=params.HOLD_S|float)}
    {% set any = 1 %}
  {% endif %}
  {% if any %}
    RESPOND TYPE=command MSG="DrukMix: limits override updated"
  {% else %}
    RESPOND TYPE=command MSG="DrukMix: no params (use MAX_LPM/MIN_LPM/HOLD_S)"
  {% endif %}

[gcode_macro DRUKMIX_DEBUG]
description: "Логи агента: LEVEL=off|info|debug (override)."
gcode:
  {% set lvl = params.LEVEL|default("info")|string %}
  {action_call_remote_method("drukmix_set_debug", level=lvl)}
  RESPOND TYPE=command MSG="DrukMix: log_level={lvl}"

[gcode_macro DRUKMIX_CLEAR]
description: "Очистити всі override (gain/limits/loglevel) -> назад до cfg."
gcode:
  {action_call_remote_method("drukmix_clear_overrides")}
  RESPOND TYPE=command MSG="DrukMix: overrides cleared"

[gcode_macro DRUKMIX_RELOAD]
description: "Попросити агента перечитати cfg ASAP."
gcode:
  {action_call_remote_method("drukmix_reload_cfg")}
  RESPOND TYPE=command MSG="DrukMix: cfg reload requested"

[gcode_macro DRUKMIX_PING]
description: "Діагностика: агент повинен відповісти в термінал."
gcode:
  {action_call_remote_method("drukmix_ping")}
  RESPOND TYPE=command MSG="DrukMix: ping request"
