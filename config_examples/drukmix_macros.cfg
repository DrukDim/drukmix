# DrukMix macros for new backend model
# printer.cfg should include only:
# [include drukmix_macros.cfg]
#
# Integration rule:
# - Do NOT call DRUKMIX_STOP from PAUSE.
# - PAUSE must remain printer-motion authority.
# - DRUKMIX_STOP is an explicit operator command.

[gcode_macro DRUKMIX_PING]
description: Ping DrukMix agent
gcode:
  {action_call_remote_method("drukmix_ping")}

[gcode_macro DRUKMIX_STATUS]
description: Show DrukMix status
gcode:
  {action_call_remote_method("drukmix_status")}

[gcode_macro DRUKMIX_STOP]
description: Unconditional stop pump; pause print only when print is not already paused
gcode:
  {action_call_remote_method("drukmix_stop")}

[gcode_macro DRUKMIX_FLUSH]
description: Run flush in percent. Default PCT=100 DURATION=0
gcode:
  {% set pct = params.PCT|default(100)|float %}
  {% set dur = params.DURATION|default(0)|float %}
  {action_call_remote_method("drukmix_flush", pct=pct, duration=dur)}

[gcode_macro DRUKMIX_GAIN]
description: Set gain percent 0..500
gcode:
  {% set pct = params.PCT|default(100)|float %}
  {action_call_remote_method("drukmix_set_gain", pct=pct)}

[gcode_macro DRUKMIX_MAX_FLOW]
description: Set operator-calibrated max flow LPM at 100 percent
gcode:
  {% set lpm = params.LPM|float %}
  {action_call_remote_method("drukmix_set_max_flow", lpm=lpm)}

[gcode_macro DRUKMIX_MIN_PRINT]
description: Set min print speed threshold in mm/s
gcode:
  {% set mms = params.MMS|default(0)|float %}
  {action_call_remote_method("drukmix_set_min_print", mms=mms)}

[gcode_macro DRUKMIX_MIN_FLOW]
description: Set minimum maintained flow in percent and hold seconds
gcode:
  {% set pct = params.PCT|default(0)|float %}
  {% set hold = params.HOLD|default(0)|float %}
  {action_call_remote_method("drukmix_set_min_flow", pct=pct, hold=hold)}

[gcode_macro DRUKMIX_RETRACT]
description: Set retract gain percent
gcode:
  {% set pct = params.PCT|default(100)|float %}
  {action_call_remote_method("drukmix_set_retract_gain", pct=pct)}

[gcode_macro DRUKMIX_RESET_FAULT]
description: Reset backend fault if supported
gcode:
  {action_call_remote_method("drukmix_reset_fault")}

[gcode_macro DRUKMIX_RELOAD]
description: Reload DrukMix cfg
gcode:
  {action_call_remote_method("drukmix_reload_cfg")}
