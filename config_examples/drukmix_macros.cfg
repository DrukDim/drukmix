# DrukMix operator commands
# printer.cfg should include only:
# [include drukmix_macros.cfg]
#
# Command ownership:
# - STATUS / STOP / FLUSH / REVERS are driver-side remote methods
# - GAIN / LPM / PRESTART / PRESTOP / SAVE / RESET execute controller-owned
#   policy changes through internal SET_DRUKMIX_* commands

[gcode_macro DRUKMIX_STATUS]
description: Show DrukMix controller/driver status
gcode:
  {action_call_remote_method("drukmix_status")}

[gcode_macro DRUKMIX_STOP]
description: Stop pump; pause print only if not already paused
gcode:
  {action_call_remote_method("drukmix_stop")}

[gcode_macro DRUKMIX_FLUSH]
description: Run flush at percent. Default PCT=100 DURATION=0
gcode:
  {% set pct = params.PCT|default(100)|float %}
  {% set dur = params.DURATION|default(0)|float %}
  {action_call_remote_method("drukmix_flush", pct=pct, duration=dur)}

[gcode_macro DRUKMIX_REVERS]
description: Run reverse at percent. Default PCT=100 DURATION=0
gcode:
  {% set pct = params.PCT|default(100)|float %}
  {% set dur = params.DURATION|default(0)|float %}
  {action_call_remote_method("drukmix_reverse", pct=pct, duration=dur)}

[gcode_macro DRUKMIX_REVERSE]
description: Alias for DRUKMIX_REVERS
gcode:
  {% set pct = params.PCT|default(100)|float %}
  {% set dur = params.DURATION|default(0)|float %}
  DRUKMIX_REVERS PCT={pct} DURATION={dur}

[gcode_macro DRUKMIX_GAIN]
description: Set pump gain percent 0..300
gcode:
  {% set pct = params.PCT|default(100)|float %}
  SET_DRUKMIX_GAIN PCT={pct}

[gcode_macro DRUKMIX_LPM]
description: Set max flow LPM at 100 percent
gcode:
  {% set lpm = params.LPM|float %}
  SET_DRUKMIX_LPM LPM={lpm}

[gcode_macro DRUKMIX_PRESTART]
description: Set prestart lookahead seconds
gcode:
  {% set sec = params.SEC|default(0)|float %}
  SET_DRUKMIX_PRESTART SEC={sec}

[gcode_macro DRUKMIX_PRESTOP]
description: Set prestop lookahead seconds
gcode:
  {% set sec = params.SEC|default(0)|float %}
  SET_DRUKMIX_PRESTOP SEC={sec}

[gcode_macro DRUKMIX_SAVE]
description: Save active tuning to drukmix_controller.cfg
gcode:
  SET_DRUKMIX_SAVE

[gcode_macro DRUKMIX_RESET]
description: Reset active tuning to last saved values
gcode:
  SET_DRUKMIX_RESET

[gcode_macro DRUKMIX_RESET_FAULT]
description: Reset backend fault if supported
gcode:
  {action_call_remote_method("drukmix_reset_fault")}
