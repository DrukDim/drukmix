# DrukMix macros for controller + driver agent
# printer.cfg should include only:
# [include drukmix_macros.cfg]
#
# Integration rules:
# - Не викликайте DRUKMIX_STOP із PAUSE.
# - PAUSE лишається авторитетом руху.
# - DRUKMIX_STOP — явна команда оператора для зупинки насоса.

[gcode_macro DRUKMIX_PING]
description: Ping DrukMix driver
gcode:
  {action_call_remote_method("drukmix_ping")}

[gcode_macro DRUKMIX_STATUS]
description: Show DrukMix controller/driver status
gcode:
  {action_call_remote_method("drukmix_status")}

[gcode_macro DRUKMIX_STOP]
description: Stop pump; pause print only if not already paused
gcode:
  {action_call_remote_method("drukmix_stop")}

[gcode_macro DRUKMIX_FLUSH]
description: Run flush at percent. Default PCT=100 DURATION=0
gcode:
  {% set pct = params.PCT|default(100)|float %}
  {% set dur = params.DURATION|default(0)|float %}
  {action_call_remote_method("drukmix_flush", pct=pct, duration=dur)}

[gcode_macro DRUKMIX_RESET_FAULT]
description: Reset backend fault if supported
gcode:
  {action_call_remote_method("drukmix_reset_fault")}
