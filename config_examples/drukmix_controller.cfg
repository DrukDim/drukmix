# DrukMix controller (Klipper extra) example config
# Include this file from printer.cfg, e.g.:
#   [include drukmix_controller.cfg]
#
# This extra computes planner-driven pump states (prestart/run/prestop)
# and exposes a compact status contract via get_status(). No blocking I/O.

[drukmix_controller]
# Enable/disable the controller extra
enabled: True

# Source objects
probe: drukmix_planner_probe
extruder: extruder

# Lookahead / policy (seconds)
pump_start_lookahead_s: 4.0
pump_run_lookahead_s: 1.0
pump_stop_lookahead_s: 3.0
# Prestart behavior:
# - fixed: use pump_prestart_pct
# - planned: use planned velocity (same mapping as run), clamped by pump_prestart_min_pct
pump_prestart_mode: fixed
pump_prestart_pct: 18.0
pump_prestart_min_pct: 0.0
pump_prestop_ramp_s: 0.0        # 0 -> hard stop at prestop boundary
pump_prestop_min_gap_s: 3.0     # ignore prestop if next start is within this gap

# Planner freshness guard (minimum 0.1s in code)
planner_stale_timeout_s: 0.8

# Velocity -> percent mapping (local in Klipper)
max_flow_lpm: 10.0
gain_pct: 100.0
min_print_mms: 0.0
min_flow_pct: 0.0
min_flow_hold_s: 0.0
retract_deadband_mms: 0.20
retract_gain_pct: 100.0
filament_diameter_fallback: 35.0

# Debug logging from the controller (rate-limited)
debug_enabled: False
debug_log_every_s: 1.0
