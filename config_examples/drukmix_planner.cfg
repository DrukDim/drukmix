# Production Klipper config for DrukMix planner-authoritative pump control.
#
# This file enables the canonical planner probe production path.

[drukmix_planner_probe]
extruder = extruder
debug_enabled = False
debug_every_n_moves = 200
print_velocity_epsilon = 0.001
pump_start_lookahead_s = 3.0
pump_stop_lookahead_s = 3.0
