# DrukMix driver agent config (example)
# Place this file on the host (e.g. ~/printer_data/config/drukmix_agent.cfg)
# and point DRUKMIX_CONFIG to it, or let the driver use the default path.
#
# This agent only drives the bridge/backend.
# Orchestration (prestart/run/prestop) lives in the Klipper extra `drukmix_controller`.

[drukmix_agent]
# Enable/disable the agent
enabled = true

# Moonraker websocket endpoint
moonraker_ws = ws://127.0.0.1:7125/websocket

# Backend selection: pumpvfd | pumptpl
backend = pumpvfd

# Bridge serial connection
serial_port = /dev/drukos-bridge
serial_baud = 921600

# Driver loop rate (Hz)
update_hz = 6.0

# Fail-safe: stop if controller status is stale/missing beyond this timeout (s)
status_timeout_s = 2.0

# UI RESPOND notifications
ui_notify = true

# Logging
log_file = /home/drukos/printer_data/logs/drukmix_driver.log
log_level = info

# Driver debug logging (optional)
debug_log = false
debug_log_period_s = 1.0
